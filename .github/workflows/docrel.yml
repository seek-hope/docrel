name: DocRel

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  doc-check:
    name: Documentation Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # needed for diff-based checks

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install DocRel
        run: npm install -g docrel

      - name: Initialize DocRel
        run: docrel init --no-hooks

      - name: Scan codebase
        run: docrel scan

      - name: Check documentation health
        run: docrel check --strict --format ci

      - name: Impact analysis (changed files)
        run: |
          CHANGED=$(git diff --name-only HEAD~1..HEAD)
          if [ -n "$CHANGED" ]; then
            echo "$CHANGED" | xargs docrel impact --format ci
          fi

      - name: Health dashboard
        run: docrel health --format ci

      - name: Review summary
        run: docrel review --format markdown >> $GITHUB_STEP_SUMMARY
